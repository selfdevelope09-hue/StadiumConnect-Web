<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | StadiumConnect</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <script src="admin-auth.js"></script>
    
    <!-- ✅ BACK4APP SDK - YAHAN ADD KIYA -->
    <script src="https://cdn.parseplatform.org/parse-js-sdk/latest/parse.min.js"></script>
    <script src="back4app-config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Poppins', sans-serif; }
        .admin-header { background: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .admin-header h1 { color: white; }
        .admin-header a { color: white; background: #001a4d; padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1rem; padding: 1rem; text-align: center; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.6rem 1.2rem; background: none; border: none; cursor: pointer; border-radius: 0.5rem; }
        .tab-btn.active { background: #001a4d; color: white; }
        .section { background: white; border-radius: 1rem; padding: 1.5rem; display: none; }
        .section.active { display: block; }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .filters input, .filters select { padding: 0.5rem; border: 1px solid #ddd; border-radius: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #eee; }
        .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 0.3rem; cursor: pointer; margin-right: 0.3rem; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-add { background: #28a745; color: white; margin-bottom: 1rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 1rem; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; }
        .photos-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .photo-item { width: 60px; height: 60px; background: #f0f0f0; border-radius: 0.5rem; overflow: hidden; position: relative; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-item button { position: absolute; top: 2px; right: 2px; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }
        .city-tag, .category-tag { background: #f0f0f0; padding: 0.3rem 0.8rem; border-radius: 2rem; display: inline-flex; align-items: center; gap: 0.5rem; margin: 0.3rem; }
        .add-section { display: flex; gap: 0.5rem; margin: 1rem 0; }
        .add-section input { flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 0.5rem; }
        @media (max-width: 768px) { th, td { font-size: 0.8rem; padding: 0.5rem; } }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>🏟️ STADIUMCONNECT | Admin Panel</h1>
    <div><a href="admin-dashboard.html">Dashboard</a><a href="directory.html" style="margin-left:0.5rem;">View Site</a><a href="#" onclick="logoutAdmin()" style="margin-left:0.5rem; background:#dc3545;">Logout</a></div>
</div>

<div class="container">
    <div class="stats" id="stats"></div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vendors')">🏪 Vendors</button>
        <button class="tab-btn" onclick="switchTab('cities')">📍 Cities</button>
        <button class="tab-btn" onclick="switchTab('categories')">📁 Categories</button>
    </div>
    
    <div id="vendorsSection" class="section active">
        <button class="btn btn-add" onclick="openVendorModal()">+ Add Vendor</button>
        <div class="filters"><input type="text" id="vendorSearch" placeholder="Search vendor..."><select id="vendorCatFilter"><option value="all">All Categories</option></select><select id="vendorCityFilter"><option value="all">All Cities</option></select></div>
        <div style="overflow-x:auto"><table id="vendorsTable"><thead><tr><th>Name</th><th>Category</th><th>City</th><th>Location</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </div>
    
    <div id="citiesSection" class="section"><h3>Manage Cities</h3><div id="cityList"></div><div class="add-section"><input type="text" id="newCity" placeholder="New city name"><button onclick="addCity()">+ Add</button></div></div>
    
    <div id="categoriesSection" class="section"><h3>Manage Categories</h3><div id="categoryList"></div><div class="add-section"><input type="text" id="newCategory" placeholder="New category name"><button onclick="addCategory()">+ Add</button></div></div>
</div>

<div id="vendorModal" class="modal"><div class="modal-content"><h3 id="modalTitle">Add Vendor</h3><form id="vendorForm"><input type="hidden" id="vendorId"><div class="form-group"><label>Name *</label><input type="text" id="vendorName" required></div><div class="form-group"><label>Category</label><select id="vendorCategory"></select></div><div class="form-group"><label>City</label><select id="vendorCity"></select></div><div class="form-group"><label>Location</label><input type="text" id="vendorLocation"></div><div class="form-group"><label>Experience</label><input type="text" id="vendorExperience"></div><div class="form-group"><label>Price Range</label><input type="text" id="vendorPrice"></div><div class="form-group"><label>Phone</label><input type="text" id="vendorPhone"></div><div class="form-group"><label>Rating</label><input type="text" id="vendorRating"></div><div class="form-group"><label>Description</label><textarea id="vendorDescription" rows="3"></textarea></div><div class="form-group"><label>Photos</label><div id="vendorPhotosGrid" class="photos-grid"></div><button type="button" onclick="uploadPhoto()" style="background:#001a4d; color:white; border:none; padding:0.3rem 0.8rem; border-radius:0.3rem;">+ Add Photo</button></div><button type="submit" class="btn btn-add" style="width:100%">Save Vendor</button></form></div></div>

<script>
let categories = ["decorator","caterer","photographer","bandbaja"];
let catNames = { decorator:"Decorators", caterer:"Caterers", photographer:"Photographers", bandbaja:"Band Baja" };
let cities = ["nagpur","pandharkawada","yavatmal","adilabad","nanded","kinwat"];
let cityNames = { nagpur:"Nagpur", pandharkawada:"Pandharkawada", yavatmal:"Yavatmal", adilabad:"Adilabad", nanded:"Nanded", kinwat:"Kinwat" };
let vendorsData = {};
let currentVendor = null;
let tempPhotos = [];

function loadData() {
    const sc = localStorage.getItem('categories'); if(sc) categories = JSON.parse(sc);
    const scn = localStorage.getItem('categoryDisplayNames'); if(scn) catNames = JSON.parse(scn);
    const sct = localStorage.getItem('cities'); if(sct) cities = JSON.parse(sct);
    const sctn = localStorage.getItem('cityDisplayNames'); if(sctn) cityNames = JSON.parse(sctn);
    const sv = localStorage.getItem('vendorsDataBackup');
    if(sv) vendorsData = JSON.parse(sv);
    else { categories.forEach(c=>{ vendorsData[c]={}; cities.forEach(ct=>{ vendorsData[c][ct]=[]; }); }); }
    updateStats(); updateFilters(); renderVendors(); renderCities(); renderCategories();
}
function saveAll() {
    localStorage.setItem('categories',JSON.stringify(categories));
    localStorage.setItem('categoryDisplayNames',JSON.stringify(catNames));
    localStorage.setItem('cities',JSON.stringify(cities));
    localStorage.setItem('cityDisplayNames',JSON.stringify(cityNames));
    localStorage.setItem('vendorsDataBackup',JSON.stringify(vendorsData));
    updateStats();
}
function updateStats() { let total=0; for(let c in vendorsData) for(let ct in vendorsData[c]) total+=vendorsData[c][ct].length; document.getElementById('stats').innerHTML=`<div class="stat-card"><h3>Vendors</h3><div>${total}</div></div><div class="stat-card"><h3>Cities</h3><div>${cities.length}</div></div><div class="stat-card"><h3>Categories</h3><div>${categories.length}</div></div>`; }
function updateFilters() {
    document.getElementById('vendorCatFilter').innerHTML = '<option value="all">All</option>'+categories.map(c=>`<option value="${c}">${catNames[c]}</option>`).join('');
    document.getElementById('vendorCityFilter').innerHTML = '<option value="all">All</option>'+cities.map(c=>`<option value="${c}">${cityNames[c]}</option>`).join('');
    document.getElementById('vendorCategory').innerHTML = categories.map(c=>`<option value="${c}">${catNames[c]}</option>`).join('');
    document.getElementById('vendorCity').innerHTML = cities.map(c=>`<option value="${c}">${cityNames[c]}</option>`).join('');
}
function renderVendors() {
    let cat = document.getElementById('vendorCatFilter').value, city = document.getElementById('vendorCityFilter').value, search = document.getElementById('vendorSearch').value.toLowerCase();
    let vendors = [];
    for(let c in vendorsData) { if(cat!=='all' && c!==cat) continue;
        for(let ct in vendorsData[c]) { if(city!=='all' && ct!==city) continue;
            vendorsData[c][ct].forEach(v => { if(search==='' || v.name.toLowerCase().includes(search)) vendors.push({...v, category:c, city:ct}); });
        }
    }
    let tbody = document.querySelector('#vendorsTable tbody');
    if(vendors.length===0){ tbody.innerHTML='<tr><td colspan="7">No vendors</td></tr>'; return; }
    tbody.innerHTML = vendors.map(v => `<tr><td>${v.name}</td><td>${catNames[v.category]}</td><td>${cityNames[v.city]}</td><td>${v.location||'-'}</td><td>${v.priceRange||'-'}</td><td>⭐ ${v.rating||'-'}</td><td><button class="btn btn-edit" onclick="editVendor('${v.id}')">Edit</button><button class="btn btn-delete" onclick="deleteVendor('${v.id}')">Del</button></td></tr>`).join('');
}
function openVendorModal() { document.getElementById('modalTitle').innerText='Add Vendor'; document.getElementById('vendorForm').reset(); document.getElementById('vendorId').value=''; currentVendor=null; tempPhotos=[]; document.getElementById('vendorPhotosGrid').innerHTML=''; document.getElementById('vendorModal').style.display='flex'; }
function editVendor(id) { for(let c in vendorsData) for(let ct in vendorsData[c]) { let v = vendorsData[c][ct].find(v=>v.id===id); if(v){ currentVendor=v; document.getElementById('modalTitle').innerText='Edit Vendor'; document.getElementById('vendorId').value=v.id; document.getElementById('vendorName').value=v.name; document.getElementById('vendorCategory').value=c; document.getElementById('vendorCity').value=ct; document.getElementById('vendorLocation').value=v.location||''; document.getElementById('vendorExperience').value=v.experience||''; document.getElementById('vendorPrice').value=v.priceRange||''; document.getElementById('vendorPhone').value=v.phone||''; document.getElementById('vendorRating').value=v.rating||''; document.getElementById('vendorDescription').value=v.description||''; renderPhotos(v.photos||[]); document.getElementById('vendorModal').style.display='flex'; return; } } }
function renderPhotos(photos) { let grid=document.getElementById('vendorPhotosGrid'); if(!photos||photos.length===0){ grid.innerHTML='<div>No photos</div>'; return; } grid.innerHTML=photos.map((p,i)=>`<div class="photo-item"><img src="${p}"><button onclick="deletePhoto(${i})">×</button></div>`).join(''); }
function uploadPhoto() { let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=ev=>{ if(currentVendor){ currentVendor.photos=currentVendor.photos||[]; currentVendor.photos.push(ev.target.result); renderPhotos(currentVendor.photos); }else{ tempPhotos.push(ev.target.result); renderPhotos(tempPhotos); } }; r.readAsDataURL(f); } }; inp.click(); }
function deletePhoto(i) { if(currentVendor){ currentVendor.photos.splice(i,1); renderPhotos(currentVendor.photos); }else{ tempPhotos.splice(i,1); renderPhotos(tempPhotos); } }
function deleteVendor(id) { if(confirm('Delete vendor?')){ for(let c in vendorsData) for(let ct in vendorsData[c]) { let idx = vendorsData[c][ct].findIndex(v=>v.id===id); if(idx!==-1){ vendorsData[c][ct].splice(idx,1); saveAll(); renderVendors(); return; } } } }

// ========= SAVE VENDOR WITH CLOUD =========
async function saveVendorFromForm(e) {
    e.preventDefault();
    let cat = document.getElementById('vendorCategory').value;
    let city = document.getElementById('vendorCity').value;
    let name = document.getElementById('vendorName').value.trim();
    if(!name){ alert('Name required'); return; }
    
    let vendorData = {
        id: document.getElementById('vendorId').value || cat.substring(0,3)+'_'+city.substring(0,3)+'_'+Date.now(),
        name: name,
        category: cat,
        city: city,
        experience: document.getElementById('vendorExperience').value || 'New',
        location: document.getElementById('vendorLocation').value || cityNames[city],
        priceRange: document.getElementById('vendorPrice').value || 'Contact',
        phone: document.getElementById('vendorPhone').value || '9423281086',
        rating: document.getElementById('vendorRating').value || '4.0',
        description: document.getElementById('vendorDescription').value || 'Professional vendor',
        photos: currentVendor ? (currentVendor.photos||[]) : tempPhotos
    };
    
    if(!vendorsData[cat]) vendorsData[cat]={};
    if(!vendorsData[cat][city]) vendorsData[cat][city]=[];
    
    if(currentVendor){
        let idx = vendorsData[cat][city].findIndex(v=>v.id===currentVendor.id);
        if(idx!==-1) vendorsData[cat][city][idx]=vendorData;
    } else {
        vendorsData[cat][city].push(vendorData);
    }
    
    saveAll();
    
    // ✅ SAVE TO CLOUD
    if(typeof saveVendorToCloud !== 'undefined') {
        let saved = await saveVendorToCloud(vendorData);
        if(saved) alert('✅ Vendor saved to cloud!');
        else alert('⚠️ Vendor saved locally only');
    } else {
        alert('✅ Vendor saved locally');
    }
    
    renderVendors();
    document.getElementById('vendorModal').style.display='none';
    currentVendor=null;
    tempPhotos=[];
}

// ========= SYNC FROM CLOUD =========
async function syncFromCloud() {
    if(typeof loadVendorsFromCloud !== 'undefined') {
        let cloudVendors = await loadVendorsFromCloud();
        if(Object.keys(cloudVendors).length > 0) {
            vendorsData = cloudVendors;
            saveAll();
            renderVendors();
            console.log('✅ Synced from cloud');
        }
    }
}

// City Functions
function renderCities() { let div=document.getElementById('cityList'); div.innerHTML=cities.map(c=>`<span class="city-tag">${cityNames[c]}<button onclick="deleteCity('${c}')">×</button></span>`).join(''); }
function addCity() { let n=document.getElementById('newCity').value.trim().toLowerCase(); if(!n)return; if(cities.includes(n)){alert('Exists');return;} cities.push(n); cityNames[n]=n; categories.forEach(c=>{ if(!vendorsData[c])vendorsData[c]={}; vendorsData[c][n]=[]; }); saveAll(); updateFilters(); renderCities(); renderVendors(); document.getElementById('newCity').value=''; }
function deleteCity(c) { if(confirm(`Delete ${cityNames[c]}?`)){ cities=cities.filter(x=>x!==c); delete cityNames[c]; categories.forEach(cat=>{ if(vendorsData[cat]) delete vendorsData[cat][c]; }); saveAll(); updateFilters(); renderCities(); renderVendors(); } }
function renderCategories() { let div=document.getElementById('categoryList'); div.innerHTML=categories.map(c=>`<span class="category-tag">${catNames[c]}<button onclick="deleteCategory('${c}')">×</button></span>`).join(''); }
function addCategory() { let n=document.getElementById('newCategory').value.trim().toLowerCase(); if(!n)return; if(categories.includes(n)){alert('Exists');return;} categories.push(n); catNames[n]=n; vendorsData[n]={}; cities.forEach(c=>{ vendorsData[n][c]=[]; }); saveAll(); updateFilters(); renderCategories(); renderVendors(); document.getElementById('newCategory').value=''; }
function deleteCategory(c) { if(confirm(`Delete ${catNames[c]}?`)){ categories=categories.filter(x=>x!==c); delete catNames[c]; delete vendorsData[c]; saveAll(); updateFilters(); renderCategories(); renderVendors(); } }
function switchTab(tab) { document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(`${tab}Section`).classList.add('active'); document.querySelectorAll('.tab-btn').forEach((b,i)=>{ b.classList.remove('active'); if((tab==='vendors'&&i===0)||(tab==='cities'&&i===1)||(tab==='categories'&&i===2)) b.classList.add('active'); }); if(tab==='cities') renderCities(); if(tab==='categories') renderCategories(); }

document.getElementById('vendorSearch').addEventListener('input',renderVendors);
document.getElementById('vendorCatFilter').addEventListener('change',renderVendors);
document.getElementById('vendorCityFilter').addEventListener('change',renderVendors);
document.getElementById('vendorForm').addEventListener('submit', saveVendorFromForm);
window.onclick = function(e) { if(e.target===document.getElementById('vendorModal')) document.getElementById('vendorModal').style.display='none'; }

loadData();
syncFromCloud();  // ✅ SYNC FROM CLOUD ON PAGE LOAD
</script>

</body>
</html>
