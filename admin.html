<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | StadiumConnect</title>
    <script src="admin-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .admin-header { background: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .admin-header h1 { color: white; }
        .admin-header a { color: white; background: #001a4d; padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1rem; padding: 1.5rem; }
        .tabs { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 2px solid #ddd; padding-bottom: 0.5rem; }
        .tab-btn { background: none; border: none; padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 0.5rem; }
        .tab-btn.active { background: #001a4d; color: white; }
        .section { background: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 2rem; display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.5rem; }
        button { background: #001a4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
    </style>
</head>
<body>
<div class="admin-header"><h1>🏟️ STADIUMCONNECT | Admin Panel</h1><div><a href="admin-dashboard.html">📊 Dashboard</a><a href="#" onclick="logoutAdmin()" style="margin-left:0.5rem;">Logout</a></div></div>
<div class="container">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="tabs"><button class="tab-btn active" onclick="switchTab('vendors')">🏪 Vendors</button><button class="tab-btn" onclick="switchTab('stadiums')">🏟️ Stadiums</button><button class="tab-btn" onclick="switchTab('bookings')">📋 Bookings</button><button class="tab-btn" onclick="switchTab('analytics')">📊 Analytics</button><button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button></div>
    <div id="vendorsTab" class="section active"><h2>Vendor Management</h2><button onclick="showAddVendor()">+ Add Vendor</button><div id="vendorList"></div></div>
    <div id="stadiumsTab" class="section"><h2>Stadium Management</h2><button onclick="showAddStadium()">+ Add Stadium</button><div id="stadiumList"></div></div>
    <div id="bookingsTab" class="section"><h2>All Bookings</h2><div id="bookingsList"></div></div>
    <div id="analyticsTab" class="section"><h2>Analytics Dashboard</h2><div id="analyticsChart"></div><div id="analyticsStats"></div></div>
    <div id="settingsTab" class="section"><h2>Settings</h2><div><h3>Cities</h3><div id="cityList"></div><input type="text" id="newCity" placeholder="New city"><button onclick="addCity()">Add</button></div><div><h3>Categories</h3><div id="categoryList"></div><input type="text" id="newCategory" placeholder="New category"><button onclick="addCategory()">Add</button></div></div>
</div>
<script>
    let vendorsData = {}, stadiums = [];
    function loadData() { let s=localStorage.getItem('vendorsDataBackup'); if(s) vendorsData=JSON.parse(s); let st=localStorage.getItem('stadiums'); if(st) stadiums=JSON.parse(st); else stadiums=[{id:1,name:"Vidarbha Stadium",city:"Nagpur",capacity:45000,price:50000}]; updateStats(); renderVendors(); renderStadiums(); renderBookings(); renderAnalytics(); renderCities(); renderCategories(); }
    function updateStats() { let totalVendors=0; for(let c in vendorsData) for(let ct in vendorsData[c]) totalVendors+=vendorsData[c][ct].length; document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><h3>Vendors</h3><div>${totalVendors}</div></div><div class="stat-card"><h3>Stadiums</h3><div>${stadiums.length}</div></div><div class="stat-card"><h3>Bookings</h3><div>${JSON.parse(localStorage.getItem('userBookings')||'[]').length}</div></div>`; }
    function renderVendors() { let html='<table><tr><th>Name</th><th>Category</th><th>City</th><th>Price</th><th>Actions</th></tr>'; for(let c in vendorsData) for(let ct in vendorsData[c]) vendorsData[c][ct].forEach(v=>{html+=`<tr><td>${v.name}</td><td>${c}</td><td>${ct}</td><td>${v.priceRange}</td><td><button onclick="editVendor('${v.id}')">Edit</button><button class="btn-danger" onclick="deleteVendor('${v.id}')">Delete</button></td></tr>`;}); html+='</table>'; document.getElementById('vendorList').innerHTML=html; }
    function renderStadiums() { let html='<table><tr><th>Name</th><th>City</th><th>Capacity</th><th>Price</th><th>Actions</th></tr>'; stadiums.forEach(s=>{html+=`<tr><td>${s.name}</td><td>${s.city}</td><td>${s.capacity}</td><td>₹${s.price}</td><td><button onclick="editStadium(${s.id})">Edit</button><button class="btn-danger" onclick="deleteStadium(${s.id})">Delete</button></td></tr>`;}); html+='</table>'; document.getElementById('stadiumList').innerHTML=html; }
    function renderBookings() { let bookings=JSON.parse(localStorage.getItem('userBookings')||'[]'); let html='<table><tr><th>User</th><th>Type</th><th>Item</th><th>Date</th><th>Status</th><th>Action</th></tr>'; bookings.forEach(b=>{html+=`<tr><td>${b.userName}</td><td>${b.type||'vendor'}</td><td>${b.vendorName||b.stadiumName}</td><td>${b.eventDate||'-'}</td><td><select onchange="updateStatus(${b.id},this.value)"><option ${b.status=='pending'?'selected':''}>pending</option><option ${b.status=='confirmed'?'selected':''}>confirmed</option><option ${b.status=='cancelled'?'selected':''}>cancelled</option></select></td><td><button onclick="deleteBooking(${b.id})">Delete</button></td></tr>`;}); html+='</table>'; document.getElementById('bookingsList').innerHTML=html; }
    function renderAnalytics() { let bookings=JSON.parse(localStorage.getItem('userBookings')||'[]'); let monthly={}; bookings.forEach(b=>{let m=new Date(b.bookedAt).toLocaleString('default',{month:'short'}); monthly[m]=(monthly[m]||0)+1;}); let chartHtml='<h3>Monthly Bookings</h3><div style="display:flex;gap:0.5rem;align-items:flex-end;height:200px;">'; for(let m in monthly) chartHtml+=`<div style="flex:1;text-align:center"><div style="background:#001a4d;height:${monthly[m]*20}px;width:100%"></div><div>${m}</div><div>${monthly[m]}</div></div>`; chartHtml+='</div>'; document.getElementById('analyticsChart').innerHTML=chartHtml; let totalRevenue=bookings.filter(b=>b.status=='confirmed').length*5000; document.getElementById('analyticsStats').innerHTML=`<div class="stat-card"><h3>Total Revenue</h3><div>₹${totalRevenue.toLocaleString()}</div></div><div class="stat-card"><h3>Completion Rate</h3><div>${Math.round(bookings.filter(b=>b.status=='confirmed').length/bookings.length*100||0)}%</div></div>`; }
    function switchTab(tab) { document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(`${tab}Tab`).classList.add('active'); document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',b.innerText.toLowerCase().includes(tab));}); }
    function addCity(){let c=document.getElementById('newCity').value; if(c){let cities=JSON.parse(localStorage.getItem('cities')||'[]'); cities.push(c.toLowerCase()); localStorage.setItem('cities',JSON.stringify(cities)); renderCities();}};
    function renderCities(){let c=JSON.parse(localStorage.getItem('cities')||'[]'); document.getElementById('cityList').innerHTML=c.map(ct=>`<div>${ct}<button onclick="deleteCity('${ct}')">×</button></div>`).join('');}
    loadData();
</script>
</body>
</html>
