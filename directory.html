<!DOCTYPE html>
<html lang="en">
<head>

<!-- Back4App Parse SDK -->
<script src="https://cdn.parseplatform.org/parse-js-sdk/latest/parse.min.js"></script>
<script src="back4app-config.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect | Vendor Directory</title>
    
    <!-- PWA MANIFEST -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StadiumConnect">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFFFF;
            font-family: 'Poppins', 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
        }

        .vendor-container {
            display: flex;
            min-height: 100vh;
            flex-wrap: wrap;
        }

        /* LEFT SIDE - SOLID BLACK */
        .vendor-sidebar {
            width: 280px;
            background: #000000;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-logo h2 {
            color: #FFFFFF;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .sidebar-logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }

        .category-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .category-btn.active {
            background: #001a4d;
            border-color: #FFFFFF;
        }

        .category-icon {
            font-size: 1.5rem;
        }

        /* RIGHT SIDE */
        .vendor-main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #FFFFFF;
            min-height: 100vh;
        }

        /* Search Bar */
        .search-section {
            max-width: 500px;
            margin-left: auto;
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            border: 1px solid #e0e0e0;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .search-icon {
            font-size: 1.2rem;
            color: #888;
            margin-right: 10px;
        }

        /* City Grid */
        .cities-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 1.5rem;
            border-left: 4px solid #001a4d;
            padding-left: 1rem;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .city-card {
            background: #f8f9fa;
            border: 1px solid #e8e8e8;
            border-radius: 1rem;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .city-card:hover {
            transform: translateY(-5px);
            border-color: #001a4d;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .city-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #001a4d;
        }

        .city-count {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.3rem;
        }

        /* Vendors Section */
        .vendors-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #000000;
            margin: 1rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            color: #001a4d;
        }

        .back-btn:hover {
            background: #001a4d;
            color: white;
        }

        .vendors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .vendor-card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 1rem;
            padding: 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .vendor-card:hover {
            border-color: #001a4d;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-3px);
        }

        .vendor-card.active {
            background: #001a4d;
            border-color: #001a4d;
        }

        .vendor-card.active .vendor-name {
            color: #FFFFFF;
        }

        .vendor-card.active .vendor-rating {
            color: #ffd966;
        }

        .vendor-card.active .vendor-location {
            color: rgba(255, 255, 255, 0.8);
        }

        .vendor-card.active .view-profile {
            background: rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
        }

        .vendor-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #001a4d;
        }

        .vendor-rating {
            color: #ffb347;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        .vendor-location {
            color: #666;
            font-size: 0.8rem;
            margin: 0.3rem 0;
        }

        .view-profile {
            margin-top: 1rem;
            padding: 0.5rem;
            background: #f5f5f5;
            text-align: center;
            border-radius: 0.5rem;
            color: #001a4d;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .book-btn {
            flex: 1;
            background: #28a745;
            color: white;
            border: none;
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
        }

        .book-btn:hover {
            background: #218838;
            transform: scale(1.02);
        }

        .wishlist-btn {
            flex: 1;
            background: #ffc107;
            color: #000;
            border: none;
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
        }

        .wishlist-btn:hover {
            background: #e0a800;
            transform: scale(1.02);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #001a4d;
        }

        .modal-header h3 {
            color: #001a4d;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }

        .submit-booking {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .vendor-sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .vendor-main {
                margin-left: 0;
                padding: 1rem;
            }
            .category-btn {
                display: inline-flex;
                width: auto;
                margin: 0.5rem;
            }
        }
    </style>
</head>
<body>

<div class="vendor-container">
    <!-- LEFT SIDE - SOLID BLACK -->
    <div class="vendor-sidebar" id="sidebarCategories">
        <div class="sidebar-logo">
            <h2>🏟️ STADIUMCONNECT</h2>
            <p>Royal Vendor Partners</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="vendor-main">
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search city...">
            </div>
        </div>

        <div id="citiesSection">
            <div class="cities-title">📍 Select Your City</div>
            <div class="cities-grid" id="citiesGrid"></div>
        </div>

        <div id="vendorsSection" style="display: none;">
            <div class="vendors-title">
                <button class="back-btn" onclick="goBackToCities()">← Back to Cities</button>
                <span id="vendorsTitle"></span>
            </div>
            <div class="vendors-grid" id="vendorsGrid"></div>
        </div>
    </div>
</div>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📅 Book This Vendor</h3>
            <button class="close-modal" onclick="closeBookingModal()">&times;</button>
        </div>
        <form id="bookingForm">
            <input type="hidden" id="bookingVendorId">
            <input type="hidden" id="bookingVendorName">
            <div class="form-group">
                <label>Event Date *</label>
                <input type="date" id="eventDate" required>
            </div>
            <div class="form-group">
                <label>Event Type *</label>
                <select id="eventType" required>
                    <option value="">Select event type</option>
                    <option value="Wedding">Wedding</option>
                    <option value="Corporate Event">Corporate Event</option>
                    <option value="Birthday Party">Birthday Party</option>
                    <option value="Concert">Concert</option>
                    <option value="Sports Event">Sports Event</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Expected Guests</label>
                <input type="number" id="guestCount" placeholder="Number of guests">
            </div>
            <div class="form-group">
                <label>Special Requests (Optional)</label>
                <textarea id="specialRequests" rows="3" placeholder="Any special requirements..."></textarea>
            </div>
            <button type="submit" class="submit-booking">Confirm Booking →</button>
        </form>
    </div>
</div>

<script>
    // ========= DATA LOADING =========
    let categories = [];
    let categoryDisplayNames = {};
    let cities = [];
    let cityDisplayNames = {};
    let vendorsData = {};
    let currentCategory = "";
    let selectedCity = null;
    let activeVendorCard = null;

    function loadData() {
        const savedCategories = localStorage.getItem('categories');
        const savedCategoryNames = localStorage.getItem('categoryDisplayNames');
        const savedCities = localStorage.getItem('cities');
        const savedCityNames = localStorage.getItem('cityDisplayNames');
        const savedVendors = localStorage.getItem('vendorsDataBackup');
        
        categories = savedCategories ? JSON.parse(savedCategories) : ["decorator", "caterer", "photographer", "bandbaja"];
        categoryDisplayNames = savedCategoryNames ? JSON.parse(savedCategoryNames) : {
            decorator: "Decorators", caterer: "Caterers", photographer: "Photographers", bandbaja: "Band Baja"
        };
        cities = savedCities ? JSON.parse(savedCities) : ["nagpur", "pandharkawada", "yavatmal", "adilabad", "nanded", "kinwat"];
        cityDisplayNames = savedCityNames ? JSON.parse(savedCityNames) : {
            nagpur: "Nagpur", pandharkawada: "Pandharkawada", yavatmal: "Yavatmal",
            adilabad: "Adilabad", nanded: "Nanded", kinwat: "Kinwat"
        };
        vendorsData = savedVendors ? JSON.parse(savedVendors) : {};
        
        categories.forEach(cat => {
            if (!vendorsData[cat]) vendorsData[cat] = {};
            cities.forEach(city => {
                if (!vendorsData[cat][city]) vendorsData[cat][city] = [];
            });
        });
    }

    // ========= USER FUNCTIONS =========
    function getCurrentUser() {
        const user = localStorage.getItem('currentUser');
        return user ? JSON.parse(user) : null;
    }

    // ========= ADD TO WISHLIST FUNCTION =========
    function addToWishlistFromCard(id, name, categoryName, rating, experience, location, priceRange) {
        const user = getCurrentUser();
        if (!user) {
            alert('Please login to save vendors to wishlist');
            window.location.href = 'login.html';
            return;
        }
        
        const vendor = { id, name, categoryName, rating, experience, location, priceRange };
        let wishlist = JSON.parse(localStorage.getItem(`wishlist_${user.id}`) || '[]');
        
        if (wishlist.find(v => v.id === id)) {
            alert('❤️ Vendor already in your wishlist!');
            return;
        }
        
        wishlist.push(vendor);
        localStorage.setItem(`wishlist_${user.id}`, JSON.stringify(wishlist));
        alert(`✅ ${name} added to wishlist!`);
    }

    // ========= RENDER FUNCTIONS =========
    function renderCategories() {
        const sidebar = document.getElementById('sidebarCategories');
        const logoHtml = `
            <div class="sidebar-logo">
                <h2>🏟️ STADIUMCONNECT</h2>
                <p>Royal Vendor Partners</p>
            </div>
        `;
        
        const categoryButtons = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}" onclick="changeCategory('${cat}')">
                <span class="category-icon">${getCategoryIcon(cat)}</span>
                <span>${categoryDisplayNames[cat] || cat}</span>
            </button>
        `).join('');
        
        sidebar.innerHTML = logoHtml + categoryButtons;
    }

    function getCategoryIcon(category) {
        const icons = { decorator: "🎨", caterer: "🍽️", photographer: "📸", bandbaja: "🎵" };
        return icons[category] || "🏷️";
    }

    function renderCities() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filteredCities = cities.filter(city => cityDisplayNames[city].toLowerCase().includes(searchTerm));
        
        const grid = document.getElementById('citiesGrid');
        if (filteredCities.length === 0) {
            grid.innerHTML = '<div class="no-results">No cities found</div>';
            return;
        }
        
        grid.innerHTML = filteredCities.map(city => `
            <div class="city-card" onclick="selectCity('${city}')">
                <div class="city-name">🏟️ ${cityDisplayNames[city]}</div>
                <div class="city-count">${vendorsData[currentCategory]?.[city]?.length || 0} vendors available</div>
            </div>
        `).join('');
    }

    function selectCity(city) {
        selectedCity = city;
        const vendors = vendorsData[currentCategory]?.[city] || [];
        
        document.getElementById('citiesSection').style.display = 'none';
        document.getElementById('vendorsSection').style.display = 'block';
        
        document.getElementById('vendorsTitle').innerHTML = `${categoryDisplayNames[currentCategory]} in ${cityDisplayNames[city]}`;
        
        const vendorsGrid = document.getElementById('vendorsGrid');
        if (vendors.length === 0) {
            vendorsGrid.innerHTML = '<div class="no-results">No vendors available in this city yet. Coming soon!</div>';
            return;
        }
        
        vendorsGrid.innerHTML = vendors.map((vendor, index) => `
            <div class="vendor-card" onclick="openVendorProfile('${currentCategory}', '${city}', ${index}, this)">
                <div class="vendor-name">${vendor.name}</div>
                <div class="vendor-rating">⭐ ${vendor.rating} ★ ${vendor.experience}</div>
                <div class="vendor-location">📍 ${vendor.location}</div>
                <div class="vendor-location">💰 ${vendor.priceRange}</div>
                <div class="view-profile">🔍 View Full Profile →</div>
                <div class="button-group">
                    <div class="book-btn" onclick="event.stopPropagation(); openBookingModal('${vendor.id}', '${vendor.name}')">📅 Book Now</div>
                    <div class="wishlist-btn" onclick="event.stopPropagation(); addToWishlistFromCard('${vendor.id}', '${vendor.name}', '${categoryDisplayNames[currentCategory]}', '${vendor.rating}', '${vendor.experience}', '${vendor.location}', '${vendor.priceRange}')">❤️ Save</div>
                </div>
            </div>
        `).join('');
    }

    function openVendorProfile(category, city, index, element) {
        if (activeVendorCard) {
            activeVendorCard.classList.remove('active');
        }
        element.classList.add('active');
        activeVendorCard = element;
        
        const vendor = vendorsData[category][city][index];
        
        localStorage.setItem('selectedVendor', JSON.stringify({
            id: vendor.id,
            name: vendor.name,
            experience: vendor.experience,
            location: vendor.location,
            priceRange: vendor.priceRange,
            phone: vendor.phone,
            rating: vendor.rating,
            description: vendor.description,
            category: category,
            city: city,
            categoryName: categoryDisplayNames[category] || category
        }));
        
        window.location.href = 'vendor-profile.html';
    }

    // ========= BOOKING FUNCTIONS =========
    function openBookingModal(vendorId, vendorName) {
        const user = getCurrentUser();
        if (!user) {
            alert('Please login to book a vendor');
            window.location.href = 'login.html';
            return;
        }
        
        document.getElementById('bookingVendorId').value = vendorId;
        document.getElementById('bookingVendorName').value = vendorName;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeBookingModal() {
        document.getElementById('bookingModal').style.display = 'none';
        document.getElementById('bookingForm').reset();
    }

    function saveBooking(bookingData) {
        let bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
        bookings.push(bookingData);
        localStorage.setItem('userBookings', JSON.stringify(bookings));
    }

    function goBackToCities() {
        document.getElementById('citiesSection').style.display = 'block';
        document.getElementById('vendorsSection').style.display = 'none';
        renderCities();
        activeVendorCard = null;
    }

    function changeCategory(category) {
        currentCategory = category;
        selectedCity = null;
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        document.getElementById('citiesSection').style.display = 'block';
        document.getElementById('vendorsSection').style.display = 'none';
        renderCities();
    }

    // ========= EVENT LISTENERS =========
    document.getElementById('searchInput').addEventListener('input', function() {
        if (document.getElementById('citiesSection').style.display !== 'none') {
            renderCities();
        }
    });
    
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const user = getCurrentUser();
        if (!user) {
            alert('Please login first');
            window.location.href = 'login.html';
            return;
        }
        
        const booking = {
            id: Date.now(),
            userId: user.id,
            userName: user.name,
            userPhone: user.phone,
            vendorId: document.getElementById('bookingVendorId').value,
            vendorName: document.getElementById('bookingVendorName').value,
            eventDate: document.getElementById('eventDate').value,
            eventType: document.getElementById('eventType').value,
            guestCount: document.getElementById('guestCount').value,
            specialRequests: document.getElementById('specialRequests').value,
            status: 'pending',
            bookedAt: new Date().toISOString()
        };
        
        saveBooking(booking);
        alert('✅ Booking request sent! Vendor will contact you soon.');
        closeBookingModal();
    });
    
    window.onclick = function(event) {
        const modal = document.getElementById('bookingModal');
        if (event.target === modal) {
            closeBookingModal();
        }
    }

    // ========= INITIALIZE =========
    loadData();
    currentCategory = categories[0] || "decorator";
    renderCategories();
    renderCities();
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker failed', err));
}
</script>

</body>
</html>
