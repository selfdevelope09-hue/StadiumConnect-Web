<!DOCTYPE html>
<html lang="en">
<head>

<!-- Back4App Parse SDK -->
<script src="https://cdn.parseplatform.org/parse-js-sdk/latest/parse.min.js"></script>
<script src="back4app-config.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | StadiumConnect</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #001a4d; margin-bottom: 1rem; }
        input { width: 100%; padding: 0.8rem; margin: 1rem 0; border: 1px solid #ddd; border-radius: 0.5rem; }
        button { width: 100%; padding: 0.8rem; background: #001a4d; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
        .error { color: red; margin-top: 0.5rem; display: none; }
        .back { margin-top: 1rem; }
        .back a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Login</h1>
        <div id="error" class="error"></div>
        <input type="password" id="password" placeholder="Admin Password">
        <button onclick="login()">Login</button>
        <div class="back"><a href="index.html">← Back to Website</a></div>
    </div>
    <script>
        const ADMIN_PASSWORD = "Stadium@2024";
        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminLoginTime', new Date().toISOString());
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('error').innerText = 'Wrong password!';
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js'); }
    </script>
</body>
</html>
