<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StadiumConnect</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StadiumConnect">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { color: #001a4d; font-size: 1.8rem; }
        .logo p { color: #666; font-size: 0.8rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.5rem; font-size: 1rem; }
        .btn { width: 100%; background: #001a4d; color: white; border: none; padding: 0.8rem; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        .btn:hover { background: #000033; }
        .login-link { text-align: center; margin-top: 1.5rem; color: #666; }
        .login-link a { color: #001a4d; text-decoration: none; font-weight: 500; }
        .message { padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; text-align: center; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 500px) { .row { grid-template-columns: 1fr; } .container { padding: 1.5rem; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>🏟️ STADIUMCONNECT</h1>
        <p>Create your account</p>
    </div>

    <div id="message" class="message"></div>

    <form id="registerForm">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fullName" required placeholder="Enter your full name">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" required placeholder="Enter phone number">
            </div>
        </div>

        <div class="form-group">
            <label>City</label>
            <select id="city">
                <option value="Nagpur">Nagpur</option>
                <option value="Pandharkawada">Pandharkawada</option>
                <option value="Yavatmal">Yavatmal</option>
                <option value="Adilabad">Adilabad</option>
                <option value="Nanded">Nanded</option>
                <option value="Kinwat">Kinwat</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Pune">Pune</option>
                <option value="Delhi">Delhi</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" required placeholder="Min 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm password">
            </div>
        </div>

        <button type="submit" class="btn">Create Account →</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const city = document.getElementById('city').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!name || !email || !phone || !password) {
            showMessage('Please fill all required fields', 'error');
            return;
        }
        
        if (password.length < 6) {
            showMessage('Password must be at least 6 characters', 'error');
            return;
        }
        
        if (password !== confirmPassword) {
            showMessage('Passwords do not match', 'error');
            return;
        }
        
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(u => u.email === email)) {
            showMessage('Email already registered. Please login.', 'error');
            return;
        }
        
        const newUser = {
            id: Date.now(),
            name: name,
            email: email,
            phone: phone,
            city: city,
            password: password,
            createdAt: new Date().toISOString()
        };
        
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        
        localStorage.setItem('currentUser', JSON.stringify({
            id: newUser.id,
            name: newUser.name,
            email: newUser.email,
            phone: newUser.phone,
            city: newUser.city
        }));
        
        showMessage('Registration successful! Redirecting...', 'success');
        
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
    });
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.className = `message ${type}`;
        msgDiv.innerText = msg;
        setTimeout(() => {
            msgDiv.className = 'message';
        }, 3000);
    }
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker failed', err));
}
</script>

</body>
</html>
