<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Back4App Parse SDK -->
<script src="https://cdn.parseplatform.org/parse-js-sdk/latest/parse.min.js"></script>
<script src="back4app-config.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Profile | StadiumConnect</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StadiumConnect">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f5f5f5; }
        .header { background: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .header h1 { color: white; font-size: 1.3rem; }
        .back-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.5rem 1rem; border-radius: 2rem; text-decoration: none; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .profile-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .banner { background: linear-gradient(135deg, #001a4d, #000033); padding: 2rem; text-align: center; }
        .banner h1 { color: white; font-size: 2rem; margin: 1rem 0; }
        .rating { color: #ffc107; font-size: 1.2rem; }
        .details { padding: 2rem; }
        .detail-row { display: flex; padding: 1rem; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .detail-label { width: 120px; font-weight: 600; color: #001a4d; }
        .detail-value { flex: 1; color: #333; }
        .description { background: #f8f9fa; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
        .photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .photo { background: #f0f0f0; height: 180px; border-radius: 0.5rem; overflow: hidden; cursor: pointer; }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        .call-btn { background: #28a745; color: white; border: none; padding: 1rem; border-radius: 2rem; width: 100%; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .call-btn:hover { background: #218838; transform: scale(1.02); }
        .book-btn { background: #001a4d; color: white; border: none; padding: 1rem; border-radius: 2rem; width: 100%; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img { max-width: 90%; max-height: 90%; }
        .error { text-align: center; padding: 3rem; color: #999; }
        @media (max-width: 768px) { .detail-label { width: 100%; margin-bottom: 0.5rem; } .container { padding: 0 1rem; } }
    </style>
</head>
<body>

<div class="header">
    <h1>🏟️ STADIUMCONNECT</h1>
    <a href="directory.html" class="back-btn">← Back to Directory</a>
</div>

<div class="container" id="profileContainer">Loading...</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

<script>
function loadVendorPhotos(id) { let p = localStorage.getItem('vendorPhotos'); if(p) { let all = JSON.parse(p); return all[id] || []; } return []; }
function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').style.display = 'flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
function openBooking(vendorId, vendorName) {
    let user = localStorage.getItem('currentUser');
    if(!user) { alert('Please login first'); window.location.href = 'login.html'; return; }
    let date = prompt('Enter event date (YYYY-MM-DD):');
    if(!date) return;
    let booking = { id: Date.now(), userId: JSON.parse(user).id, userName: JSON.parse(user).name, userPhone: JSON.parse(user).phone, vendorId: vendorId, vendorName: vendorName, eventDate: date, status: 'pending', bookedAt: new Date().toISOString() };
    let bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
    bookings.push(booking);
    localStorage.setItem('userBookings', JSON.stringify(bookings));
    alert('✅ Booking request sent! Vendor will contact you.');
}
function loadProfile() {
    let vendorData = localStorage.getItem('selectedVendor');
    if(!vendorData) { document.getElementById('profileContainer').innerHTML = '<div class="error">No vendor selected. <a href="directory.html">Go back</a></div>'; return; }
    let vendor = JSON.parse(vendorData);
    let photos = loadVendorPhotos(vendor.id);
    let catIcons = { Decorator:"🎨", Caterer:"🍽️", Photographer:"📸", "Band Baja":"🎵" };
    let photosHtml = photos.length ? `<div class="photos">${photos.map(p => `<div class="photo" onclick="openLightbox('${p}')"><img src="${p}"></div>`).join('')}</div>` : '<div class="description">📸 No photos uploaded yet</div>';
    document.getElementById('profileContainer').innerHTML = `
        <div class="profile-card">
            <div class="banner"><div style="font-size:3rem;">${catIcons[vendor.categoryName] || '🏆'}</div><h1>${vendor.name}</h1><div class="rating">⭐ ${vendor.rating} ★ ${vendor.experience}</div></div>
            <div class="details">
                <div class="detail-row"><div class="detail-label">📍 Location</div><div class="detail-value">${vendor.location}</div></div>
                <div class="detail-row"><div class="detail-label">💰 Price Range</div><div class="detail-value">${vendor.priceRange}</div></div>
                <div class="detail-row"><div class="detail-label">📞 Contact</div><div class="detail-value">${vendor.phone}</div></div>
                <div class="description"><strong>📖 About</strong><br>${vendor.description || 'Professional vendor with years of experience.'}</div>
                <div class="description"><strong>📷 Work Portfolio</strong><br>${photosHtml}</div>
                <button class="call-btn" onclick="window.location.href='tel:${vendor.phone}'">📞 Call Agent</button>
                <button class="book-btn" onclick="openBooking('${vendor.id}', '${vendor.name}')">📅 Book Now</button>
            </div>
        </div>
    `;
}
loadProfile();
</script>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js'); }
</script>

</body>
</html>
