<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect | Vendor Profile</title>
    
    <!-- PWA MANIFEST -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StadiumConnect">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        .profile-header { background: #000000; padding: 1.5rem 2rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .logo h1 { color: #FFFFFF; font-size: 1.5rem; }
        .back-home { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #FFFFFF; padding: 0.6rem 1.2rem; border-radius: 2rem; text-decoration: none; }
        .profile-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .vendor-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .banner { background: linear-gradient(135deg, #001a4d, #000033); padding: 2rem; text-align: center; }
        .banner h1 { color: white; font-size: 2rem; }
        .details { padding: 2rem; }
        .detail { display: flex; padding: 0.8rem; border-bottom: 1px solid #eee; }
        .detail-label { width: 120px; font-weight: 600; color: #001a4d; }
        .detail-value { flex: 1; color: #333; }
        .description { background: #f8f9fa; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
        .photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .photo { background: #f0f0f0; height: 150px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        .call-btn { background: #001a4d; color: white; border: none; padding: 1rem; border-radius: 2rem; width: 100%; font-size: 1.2rem; cursor: pointer; margin-top: 1rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img { max-width: 90%; max-height: 90%; }
        .error { text-align: center; padding: 3rem; color: #999; }
    </style>
</head>
<body>

<div class="profile-header">
    <div class="logo"><h1>🏟️ STADIUMCONNECT</h1></div>
    <a href="directory.html" class="back-home">← Back</a>
</div>

<div class="profile-container" id="profileContainer">Loading...</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="">
</div>

<script>
function loadVendorPhotos(id) { let p = localStorage.getItem('vendorPhotos'); if(p){ let all=JSON.parse(p); return all[id]||[]; } return []; }
function openLightbox(src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').style.display='flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display='none'; }
function loadProfile() {
    let v = localStorage.getItem('selectedVendor');
    if(!v){ document.getElementById('profileContainer').innerHTML='<div class="error">No vendor selected</div>'; return; }
    let vendor = JSON.parse(v);
    let photos = loadVendorPhotos(vendor.id);
    let catIcons = { Decorator:"🎨", Caterer:"🍽️", Photographer:"📸", "Band Baja":"🎵" };
    let photosHtml = photos.length ? `<div class="photos">${photos.map(p=>`<div class="photo" onclick="openLightbox('${p}')"><img src="${p}"></div>`).join('')}</div>` : '<div class="description">📸 No photos yet</div>';
    document.getElementById('profileContainer').innerHTML = `
        <div class="vendor-card">
            <div class="banner"><div style="font-size:3rem">${catIcons[vendor.categoryName]||'🏆'}</div><h1>${vendor.name}</h1><div>⭐ ${vendor.rating}</div></div>
            <div class="details">
                <div class="detail"><div class="detail-label">Experience</div><div class="detail-value">${vendor.experience}</div></div>
                <div class="detail"><div class="detail-label">Location</div><div class="detail-value">${vendor.location}</div></div>
                <div class="detail"><div class="detail-label">Price</div><div class="detail-value">${vendor.priceRange}</div></div>
                <div class="detail"><div class="detail-label">Contact</div><div class="detail-value">${vendor.phone}</div></div>
                <div class="description"><strong>About</strong><br>${vendor.description||'Professional vendor'}</div>
                <div class="description"><strong>Work Portfolio</strong><br>${photosHtml}</div>
                <button class="call-btn" onclick="window.location.href='tel:${vendor.phone}'">📞 Call Agent</button>
            </div>
        </div>
    `;
}
loadProfile();
</script>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js').then(r=>console.log('SW ready')).catch(e=>console.log('SW failed')); }
</script>

</body>
</html>
