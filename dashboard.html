<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | StadiumConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <div class="logo">
        <h1>🏟️ STADIUMCONNECT</h1>
        <p>Your Event Partner</p>
    </div>
    <div class="nav-links">
        <!-- JS will populate this -->
    </div>
</header>

<div class="container">
    <div id="userGreeting" style="margin-bottom: 2rem;">
        <h1 style="color: #001a4d;">Welcome, <span id="userName"></span>!</h1>
        <p style="color: #666;">Manage your bookings and explore vendors</p>
    </div>
    
    <div class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Bookings</h3>
            <div class="stat-number" id="totalBookings">0</div>
        </div>
        <div class="stat-card">
            <h3>Active Bookings</h3>
            <div class="stat-number" id="activeBookings">0</div>
        </div>
        <div class="stat-card">
            <h3>Saved Vendors</h3>
            <div class="stat-number" id="savedVendors">0</div>
        </div>
    </div>
    
    <div class="bookings-list">
        <h2>📋 Recent Bookings</h2>
        <div id="bookingsList">
            <p style="color: #999; text-align: center; padding: 2rem;">No bookings yet. <a href="directory.html">Browse vendors</a> to get started.</p>
        </div>
    </div>
    
    <div style="margin-top: 2rem; text-align: center;">
        <a href="directory.html" style="background: #001a4d; color: white; padding: 0.8rem 2rem; text-decoration: none; border-radius: 2rem; display: inline-block;">Browse Vendors →</a>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Check if user is logged in
    const user = getCurrentUser();
    if (!user) {
        window.location.href = 'login.html';
    }
    
    document.getElementById('userName').innerText = user.name;
    
    // Load bookings
    const bookings = getUserBookings();
    document.getElementById('totalBookings').innerText = bookings.length;
    document.getElementById('activeBookings').innerText = bookings.filter(b => b.status === 'confirmed').length;
    
    const savedVendors = JSON.parse(localStorage.getItem(`savedVendors_${user.id}`) || '[]');
    document.getElementById('savedVendors').innerText = savedVendors.length;
    
    // Display bookings
    const bookingsList = document.getElementById('bookingsList');
    if (bookings.length > 0) {
        bookingsList.innerHTML = bookings.map(b => `
            <div class="booking-item">
                <div>
                    <strong>${b.vendorName}</strong><br>
                    <small>${b.eventDate || 'Date TBD'} | ${b.location}</small>
                </div>
                <div>
                    <span class="booking-status status-${b.status}">${b.status}</span>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
