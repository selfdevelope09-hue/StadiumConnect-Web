<!DOCTYPE html>
<html lang="en">
<head>

<!-- Back4App Parse SDK -->
<script src="https://cdn.parseplatform.org/parse-js-sdk/latest/parse.min.js"></script>
<script src="back4app-config.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | StadiumConnect</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a4d">
    <script src="admin-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .header { background: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .header h1 { color: white; font-size: 1.3rem; }
        .header a { color: white; text-decoration: none; background: #001a4d; padding: 0.5rem 1rem; border-radius: 0.5rem; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1rem; padding: 1.5rem; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #001a4d; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 0.5rem; }
        .tab-btn.active { background: #001a4d; color: white; }
        .table-container { background: white; border-radius: 1rem; padding: 1.5rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #001a4d; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.75rem; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .action-btn { background: #28a745; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 0.3rem; cursor: pointer; margin-right: 0.3rem; }
        .action-btn.cancel { background: #dc3545; }
        .empty { text-align: center; padding: 2rem; color: #999; }
        @media (max-width: 768px) { th, td { font-size: 0.8rem; padding: 0.5rem; } }
    </style>
</head>
<body>

<div class="header">
    <h1>🏟️ STADIUMCONNECT | Admin Dashboard</h1>
    <div><a href="admin.html">Vendor Management</a><a href="directory.html" style="margin-left:0.5rem;">View Site</a><a href="#" onclick="logoutAdmin()" style="margin-left:0.5rem; background:#dc3545;">Logout</a></div>
</div>

<div class="container">
    <div class="stats" id="stats"></div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('bookings')">📋 Bookings</button>
        <button class="tab-btn" onclick="switchTab('users')">👥 Users</button>
        <button class="tab-btn" onclick="switchTab('vendors')">🏪 Vendors</button>
    </div>
    
    <div id="bookingsTab" class="table-container"><div class="empty">Loading...</div></div>
    <div id="usersTab" class="table-container" style="display:none;"></div>
    <div id="vendorsTab" class="table-container" style="display:none;"></div>
</div>

<script>
    let users = [], bookings = [], vendors = [];
    
    function loadData() {
        users = JSON.parse(localStorage.getItem('users') || '[]');
        bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
        const vData = JSON.parse(localStorage.getItem('vendorsDataBackup') || '{}');
        vendors = [];
        for (let cat in vData) {
            for (let city in vData[cat]) {
                vData[cat][city].forEach(v => vendors.push({...v, category: cat}));
            }
        }
        updateStats();
    }
    
    function updateStats() {
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h3>Total Bookings</h3><div class="stat-number">${bookings.length}</div></div>
            <div class="stat-card"><h3>Pending</h3><div class="stat-number">${bookings.filter(b=>b.status==='pending').length}</div></div>
            <div class="stat-card"><h3>Confirmed</h3><div class="stat-number">${bookings.filter(b=>b.status==='confirmed').length}</div></div>
            <div class="stat-card"><h3>Users</h3><div class="stat-number">${users.length}</div></div>
            <div class="stat-card"><h3>Vendors</h3><div class="stat-number">${vendors.length}</div></div>
        `;
    }
    
    function renderBookings() {
        const container = document.getElementById('bookingsTab');
        if (bookings.length === 0) { container.innerHTML = '<div class="empty">No bookings yet</div>'; return; }
        container.innerHTML = `
            <table><thead><tr><th>ID</th><th>User</th><th>Vendor</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>
            ${bookings.map(b => `
                <tr><td>${b.id}</td><td>${b.userName || '-'}</td><td>${b.vendorName || '-'}</td><td>${b.eventDate || '-'}</td>
                <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                <td><button class="action-btn" onclick="updateStatus(${b.id},'confirmed')">Confirm</button>
                <button class="action-btn cancel" onclick="updateStatus(${b.id},'cancelled')">Cancel</button></td></tr>
            `).join('')}</tbody></table>
        `;
    }
    
    function renderUsers() {
        const container = document.getElementById('usersTab');
        if (users.length === 0) { container.innerHTML = '<div class="empty">No users</div>'; return; }
        container.innerHTML = `
            <table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>Registered</th><th>Bookings</th></tr></thead><tbody>
            ${users.map(u => `
                <tr><td>${u.name}</td><td>${u.email}</td><td>${u.phone || '-'}</td><td>${u.city || '-'}</td>
                <td>${new Date(u.createdAt).toLocaleDateString()}</td><td>${bookings.filter(b=>b.userId===u.id).length}</td></tr>
            `).join('')}</tbody></table>
        `;
    }
    
    function renderVendors() {
        const container = document.getElementById('vendorsTab');
        if (vendors.length === 0) { container.innerHTML = '<div class="empty">No vendors</div>'; return; }
        container.innerHTML = `
            <table><thead><tr><th>Name</th><th>Category</th><th>City</th><th>Location</th><th>Price</th><th>Rating</th><th>Bookings</th></tr></thead><tbody>
            ${vendors.map(v => `
                <tr><td>${v.name}</td><td>${v.category}</td><td>${v.city || '-'}</td><td>${v.location || '-'}</td>
                <td>${v.priceRange || '-'}</td><td>⭐ ${v.rating}</td><td>${bookings.filter(b=>b.vendorId===v.id).length}</td></tr>
            `).join('')}</tbody></table>
        `;
    }
    
    function updateStatus(id, status) {
        const index = bookings.findIndex(b => b.id === id);
        if (index !== -1) {
            bookings[index].status = status;
            localStorage.setItem('userBookings', JSON.stringify(bookings));
            loadData();
            renderBookings();
            alert(`Booking ${status}!`);
        }
    }
    
    function switchTab(tab) {
        document.getElementById('bookingsTab').style.display = 'none';
        document.getElementById('usersTab').style.display = 'none';
        document.getElementById('vendorsTab').style.display = 'none';
        document.querySelectorAll('.tab-btn').forEach((btn,i) => btn.classList.remove('active'));
        if (tab === 'bookings') { document.getElementById('bookingsTab').style.display = 'block'; document.querySelectorAll('.tab-btn')[0].classList.add('active'); renderBookings(); }
        else if (tab === 'users') { document.getElementById('usersTab').style.display = 'block'; document.querySelectorAll('.tab-btn')[1].classList.add('active'); renderUsers(); }
        else { document.getElementById('vendorsTab').style.display = 'block'; document.querySelectorAll('.tab-btn')[2].classList.add('active'); renderVendors(); }
    }
    
    loadData();
    renderBookings();
</script>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js'); }
</script>

</body>
</html>
