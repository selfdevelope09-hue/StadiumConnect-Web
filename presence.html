<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect | Vendor Directory - Royal Partners</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFFFF;
            font-family: 'Poppins', 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Main Container */
        .vendor-container {
            display: flex;
            min-height: 100vh;
            flex-wrap: wrap;
        }

        /* ========= LEFT SIDE - VENDOR CATEGORIES ========= */
        .vendor-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #001a4d 0%, #000033 100%);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        /* Royal Logo in Sidebar */
        .sidebar-logo {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .sidebar-logo h2 {
            color: #ffd966;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .sidebar-logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }

        /* Category Buttons - WHITE TEXT */
        .category-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .category-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd966;
            transform: translateX(5px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: #000033;
            border-color: transparent;
        }

        .category-icon {
            font-size: 1.5rem;
        }

        /* ========= RIGHT SIDE - MAIN CONTENT ========= */
        .vendor-main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #FFFFFF;
            min-height: 100vh;
        }

        /* Search Bar */
        .search-section {
            max-width: 500px;
            margin-left: auto;
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #ffd966;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .search-icon {
            font-size: 1.2rem;
            color: #888;
            margin-right: 10px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: #aaa;
        }

        /* City Grid */
        .cities-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #001a4d;
            margin-bottom: 1.5rem;
            border-left: 4px solid #ffd966;
            padding-left: 1rem;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .city-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border: 1px solid #e8e8e8;
            border-radius: 1rem;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .city-card:hover {
            transform: translateY(-5px);
            border-color: #ffd966;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .city-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #001a4d;
        }

        .city-count {
            font-size: 0.8rem;
            color: #ffb347;
            margin-top: 0.3rem;
        }

        /* Vendors List */
        .vendors-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #001a4d;
            margin: 2rem 0 1rem 0;
        }

        .vendors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .vendor-card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 1rem;
            padding: 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .vendor-card:hover {
            border-color: #ffd966;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .vendor-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #001a4d;
        }

        .vendor-rating {
            color: #ffb347;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        .vendor-location {
            color: #666;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 0.5rem 0;
        }

        .view-profile {
            margin-top: 1rem;
            padding: 0.5rem;
            background: #f5f5f5;
            text-align: center;
            border-radius: 0.5rem;
            color: #001a4d;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Modal - Vendor Profile */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 2rem;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #001a4d, #000033);
            padding: 1.5rem;
            border-radius: 2rem 2rem 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: #ffd966;
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 2rem;
        }

        .profile-detail {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: #f8f9fa;
            border-radius: 0.8rem;
        }

        .profile-detail strong {
            color: #001a4d;
            display: inline-block;
            width: 100px;
        }

        .call-agent-btn {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            color: #000033;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .call-agent-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .photos-section {
            margin-top: 1.5rem;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-top: 0.8rem;
        }

        .photo-placeholder {
            background: #e0e0e0;
            height: 100px;
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .vendor-sidebar {
                width: 100%;
                position: relative;
                height: auto;
                padding: 1rem;
            }
            .vendor-main {
                margin-left: 0;
                padding: 1rem;
            }
            .category-btn {
                display: inline-flex;
                width: auto;
                margin: 0.5rem;
            }
            .sidebar-logo {
                display: none;
            }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #001a4d;
        }
    </style>
</head>

            ]

    // Cities List
    const cities = ["nagpur", "pandharkawada", "yavatmal", "adilabad", "nanded", "kinwat"];
    const cityDisplayNames = {
        nagpur: "Nagpur", pandharkawada: "Pandharkawada", yavatmal: "Yavatmal",
        adilabad: "Adilabad", nanded: "Nanded", kinwat: "Kinwat"
    };

    let currentCategory = "decorator";
    let selectedCity = null;

    // Render Cities
    function renderCities() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filteredCities = cities.filter(city => cityDisplayNames[city].toLowerCase().includes(searchTerm));
        
        const grid = document.getElementById('citiesGrid');
        if (filteredCities.length === 0) {
            grid.innerHTML = '<div class="no-results">No cities found</div>';
            return;
        }
        
        grid.innerHTML = filteredCities.map(city => `
            <div class="city-card" onclick="selectCity('${city}')">
                <div class="city-name">🏟️ ${cityDisplayNames[city]}</div>
                <div class="city-count">${vendorsData[currentCategory]?.[city]?.length || 0} vendors available</div>
            </div>
        `).join('');
    }

    // Select City - Show Vendors
    function selectCity(city) {
        selectedCity = city;
        const vendors = vendorsData[currentCategory]?.[city] || [];
        
        document.getElementById('citiesSection').style.display = 'none';
        document.getElementById('vendorsSection').style.display = 'block';
        
        const categoryNames = { decorator: "Decorators", caterer: "Caterers", photographer: "Photographers", bandbaja: "Band Baja" };
        document.getElementById('vendorsTitle').innerHTML = `🎨 ${categoryNames[currentCategory]} in ${cityDisplayNames[city]}`;
        
        const vendorsGrid = document.getElementById('vendorsGrid');
        if (vendors.length === 0) {
            vendorsGrid.innerHTML = '<div class="no-results">No vendors available in this city yet. Coming soon!</div>';
            return;
        }
        
        vendorsGrid.innerHTML = vendors.map((vendor, index) => `
            <div class="vendor-card" onclick="openProfile('${currentCategory}', '${city}', ${index})">
                <div class="vendor-name">${vendor.name}</div>
                <div class="vendor-rating">⭐ ${vendor.experience}</div>
                <div class="vendor-location">📍 ${vendor.location}</div>
                <div class="vendor-location">💰 ${vendor.priceRange}</div>
                <div class="view-profile">🔍 View Full Profile →</div>
            </div>
        `).join('');
    }

    // Open Vendor Profile Modal
    function openProfile(category, city, index) {
        const vendor = vendorsData[category][city][index];
        const modal = document.getElementById('vendorModal');
        
        document.getElementById('modalVendorName').innerHTML = vendor.name;
        
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="profile-detail"><strong>👤 Name:</strong> ${vendor.name}</div>
            <div class="profile-detail"><strong>⭐ Experience:</strong> ${vendor.experience}</div>
            <div class="profile-detail"><strong>📍 Location:</strong> ${vendor.location}</div>
            <div class="profile-detail"><strong>💰 Price Range:</strong> ${vendor.priceRange}</div>
            <div class="profile-detail"><strong>📞 Contact:</strong> ${vendor.phone}</div>
            
            <div class="photos-section">
                <strong>📷 Work Portfolio</strong>
                <div class="photos-grid">
                    <div class="photo-placeholder">📸 Photo 1<br>(Coming Soon)</div>
                    <div class="photo-placeholder">📸 Photo 2<br>(Coming Soon)</div>
                    <div class="photo-placeholder">📸 Photo 3<br>(Coming Soon)</div>
                </div>
                <p style="font-size: 0.7rem; color: #888; margin-top: 0.5rem;">*Photos will be uploaded soon</p>
            </div>
            
            <button class="call-agent-btn" onclick="makeCall('${vendor.phone}')">
                📞 Call Agent Now
            </button>
        `;
        
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    // Direct Call Function
    function makeCall(phoneNumber) {
        window.location.href = `tel:${phoneNumber}`;
    }

    // Close Modal
    function closeModal() {
        document.getElementById('vendorModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Change Category
    function changeCategory(category) {
        currentCategory = category;
        selectedCity = null;
        
        // Update active button
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // Reset view
        document.getElementById('citiesSection').style.display = 'block';
        document.getElementById('vendorsSection').style.display = 'none';
        renderCities();
    }

    // Search Function
    document.getElementById('searchInput').addEventListener('input', function() {
        if (document.getElementById('citiesSection').style.display !== 'none') {
            renderCities();
        }
    });

    // Event Listeners
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => changeCategory(btn.dataset.category));
    });

    // Back button to cities
    window.goBackToCities = function() {
        document.getElementById('citiesSection').style.display = 'block';
        document.getElementById('vendorsSection').style.display = 'none';
        renderCities();
    };

    // Initialize
    renderCities();

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('vendorModal');
        if (event.target === modal) closeModal();
    };
</script>

</body>
</html>
